<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localizar mi móvil</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Localizar mi móvil</h1>
      <p class="subtitle">¿No encuentras tu teléfono? Hazlo sonar con un clic.</p>
    </header>

    <main>
      <div id="quick-open" class="quick-open" style="display: none;">
        <button id="btn-quick" class="btn btn-quick">
          <span class="btn-icon">📍</span>
          <span class="btn-label">Localizar ahora</span>
        </button>
      </div>
      <div class="buttons">
        <button id="btn-android" class="btn btn-android">
          <span class="btn-icon">🤖</span>
          <span class="btn-label">Android</span>
          <span class="btn-hint">Find My Device</span>
        </button>
        <button id="btn-iphone" class="btn btn-iphone">
          <span class="btn-icon">🍎</span>
          <span class="btn-label">iPhone</span>
          <span class="btn-hint">Find My iPhone</span>
        </button>
      </div>

      <div class="remember">
        <label>
          <input type="checkbox" id="rememberPlatform" />
          Recordar mi plataforma
        </label>
      </div>
    </main>

    <footer>
      <p class="note">Se abrirá en una nueva pestaña. Inicia sesión si es necesario.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
